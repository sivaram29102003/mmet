<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MMET — Edit Entry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg:        #48426d;
    --bg-dark:   #342e55;
    --bg-deeper: #28234a;
    --accent:    #c9b8ff;
    --accent2:   #8b7fd4;
    --confirmed: #4caf8a;
    --doubted:   #e07b5a;
    --danger:    #e05a5a;
    --surface:   rgba(255,255,255,0.06);
    --surface2:  rgba(255,255,255,0.11);
    --border:    rgba(255,255,255,0.12);
    --text:      #f0ecff;
    --text-dim:  #a099c8;
    --font-head: 'Orbitron', monospace;
    --font-body: 'Rajdhani', sans-serif;
    --radius:    6px;
}

html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg-deeper);
    font-family: var(--font-body);
    color: var(--text);
}

.app {
    width: 100%; max-width: 430px;
    height: 100dvh;
    margin: 0 auto;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ── HEADER ── */
.header {
    padding: 15px 15px 12px;
    background: var(--bg-dark);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}

.back-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--accent);
    font-size: 1.1rem;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.2s;
}

.back-btn:active { opacity: 0.6; }

.header-title {
    font-family: var(--font-head);
    font-size: 0.72rem;
    letter-spacing: 2.5px;
    color: var(--accent);
    text-transform: uppercase;
}

/* ── BODY ── */
.edit-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    -webkit-overflow-scrolling: touch;
}

/* type indicator banner */
.type-banner {
    width: 100%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-family: var(--font-head);
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-align: center;
    font-weight: 700;
}

.type-banner.confirmed {
    background: rgba(76,175,138,0.15);
    border: 1.5px solid var(--confirmed);
    color: var(--confirmed);
}

.type-banner.doubted {
    background: rgba(224,123,90,0.15);
    border: 1.5px solid var(--doubted);
    color: var(--doubted);
}

/* field */
.field-label {
    font-size: 0.7rem;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 600;
    text-transform: uppercase;
}

.m-input {
    width: 100%;
    padding: 12px 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.98rem;
    outline: none;
    transition: border-color 0.2s;
}

.m-input:focus { border-color: var(--accent2); }
.m-input::placeholder { color: var(--text-dim); opacity: 0.6; }

/* type toggle */
.type-toggle { display: flex; gap: 8px; }

.type-btn {
    flex: 1;
    padding: 10px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.18s;
}

.type-btn.active-confirmed {
    background: rgba(76,175,138,0.18);
    border-color: var(--confirmed);
    color: var(--confirmed);
}

.type-btn.active-doubted {
    background: rgba(224,123,90,0.18);
    border-color: var(--doubted);
    color: var(--doubted);
}

.form-error {
    font-size: 0.78rem;
    color: var(--doubted);
    text-align: center;
    min-height: 16px;
    letter-spacing: 0.5px;
}

/* action buttons */
.action-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
}

.btn-update {
    flex: 1;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent2), #5a4fb5);
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-head);
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: #fff;
    cursor: pointer;
    transition: opacity 0.2s;
}

.btn-update:active { opacity: 0.8; }

.btn-delete {
    padding: 13px 16px;
    background: rgba(224,90,90,0.15);
    border: 1.5px solid var(--danger);
    border-radius: var(--radius);
    font-family: var(--font-head);
    font-size: 0.7rem;
    letter-spacing: 1px;
    color: var(--danger);
    cursor: pointer;
    transition: background 0.2s;
}

.btn-delete:active { background: rgba(224,90,90,0.3); }

/* confirm delete overlay */
.confirm-overlay {
    position: absolute;
    inset: 0;
    background: rgba(20,16,40,0.82);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s;
}

.confirm-overlay.open {
    opacity: 1;
    pointer-events: all;
}

.confirm-box {
    background: var(--bg-dark);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 22px;
    width: calc(100% - 60px);
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    text-align: center;
    transform: scale(0.92);
    transition: transform 0.22s;
}

.confirm-overlay.open .confirm-box { transform: scale(1); }

.confirm-box .confirm-icon { font-size: 2rem; }

.confirm-box h3 {
    font-family: var(--font-head);
    font-size: 0.8rem;
    letter-spacing: 1.5px;
    color: var(--danger);
}

.confirm-box p {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.5;
}

.confirm-btns { display: flex; gap: 10px; width: 100%; }

.confirm-btns button {
    flex: 1;
    padding: 11px;
    border-radius: var(--radius);
    border: none;
    font-family: var(--font-head);
    font-size: 0.65rem;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: opacity 0.2s;
}

.confirm-btns button:active { opacity: 0.7; }

.btn-cancel-del {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border) !important;
}

.btn-confirm-del {
    background: var(--danger);
    color: #fff;
}

/* not found */
.not-found {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
}
</style>
</head>
<body>

<div class="app" style="position:relative">

    <!-- HEADER -->
    <div class="header">
        <div class="back-btn" onclick="goBack()">←</div>
        <div class="header-title">Edit Entry</div>
    </div>

    <!-- EDIT BODY -->
    <div class="edit-body" id="editBody">
        <!-- filled by JS -->
    </div>

    <!-- DELETE CONFIRM -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <div class="confirm-icon">🗑️</div>
            <h3>DELETE ENTRY</h3>
            <p>This action cannot be undone. Are you sure you want to delete this entry?</p>
            <div class="confirm-btns">
                <button class="btn-cancel-del" onclick="closeConfirm()">CANCEL</button>
                <button class="btn-confirm-del" onclick="confirmDelete()">DELETE</button>
            </div>
        </div>
    </div>

</div>

<script>
const editId = localStorage.getItem('mmet_edit_id');
let entries  = JSON.parse(localStorage.getItem('mmet_entries') || '[]');
let entry    = entries.find(e => e.id === editId);
let selType  = '';

function save() { localStorage.setItem('mmet_entries', JSON.stringify(entries)); }
function goBack() { window.location.href = 'front.html'; }

function selectType(type) {
    selType = type;
    document.getElementById('eBtnConfirmed').className = 'type-btn' + (type === 'confirmed' ? ' active-confirmed' : '');
    document.getElementById('eBtnDoubted').className   = 'type-btn' + (type === 'doubted'   ? ' active-doubted'   : '');
}

function buildForm() {
    const body = document.getElementById('editBody');

    if (!entry) {
        body.innerHTML = `<div class="not-found"><span style="font-size:2rem">🔍</span><p>Entry not found.</p></div>`;
        return;
    }

    selType = entry.type;
    // Strip suffix from displayed title for editing
    const displayTitle = entry.title.replace(/-(c|d)$/, '');

    body.innerHTML = `
        <div class="type-banner ${entry.type}">
            ${entry.type === 'confirmed' ? '✔ CONFIRMED ENTRY' : '? DOUBTED ENTRY'}
        </div>

        <div>
            <div class="field-label">Title</div>
            <input type="text" class="m-input" id="eTitle" value="${displayTitle}" placeholder="Title">
        </div>

        <div>
            <div class="field-label">Money Type</div>
            <div class="type-toggle">
                <button class="type-btn ${entry.type === 'confirmed' ? 'active-confirmed' : ''}" id="eBtnConfirmed" onclick="selectType('confirmed')">✔ Confirmed</button>
                <button class="type-btn ${entry.type === 'doubted'   ? 'active-doubted'   : ''}" id="eBtnDoubted"   onclick="selectType('doubted')">? Doubted</button>
            </div>
        </div>

        <div>
            <div class="field-label">Amount (₹)</div>
            <input type="number" class="m-input" id="eAmount" value="${entry.amount}" min="0">
        </div>

        <div>
            <div class="field-label">Description <span style="color:var(--text-dim);font-size:0.65rem">(optional)</span></div>
            <input type="text" class="m-input" id="eDesc" value="${entry.desc || ''}" placeholder="Note…">
        </div>

        <div class="form-error" id="editError"></div>

        <div class="action-row">
            <button class="btn-update" onclick="updateEntry()">SAVE CHANGES</button>
            <button class="btn-delete" onclick="openConfirm()">DELETE</button>
        </div>
    `;
}

function updateEntry() {
    const title  = document.getElementById('eTitle').value.trim();
    const amount = document.getElementById('eAmount').value.trim();
    const desc   = document.getElementById('eDesc').value.trim();
    const err    = document.getElementById('editError');

    if (!title)  { err.textContent = 'Title is required.'; return; }
    if (!selType) { err.textContent = 'Select Confirmed or Doubted.'; return; }
    if (!amount || isNaN(amount) || Number(amount) < 0) { err.textContent = 'Enter a valid amount.'; return; }

    const suffix = selType === 'confirmed' ? '-c' : '-d';
    const idx = entries.findIndex(e => e.id === editId);
    if (idx !== -1) {
        entries[idx] = {
            ...entries[idx],
            title:  title + suffix,
            amount: Number(amount),
            type:   selType,
            desc:   desc
        };
        save();
    }
    window.location.href = 'front.html';
}

function openConfirm()  { document.getElementById('confirmOverlay').classList.add('open'); }
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); }

function confirmDelete() {
    entries = entries.filter(e => e.id !== editId);
    save();
    window.location.href = 'front.html';
}

buildForm();
</script>
</body>
</html>
