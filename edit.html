<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMET - Edit Entry</title>
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.json">
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --bg: #f4f7fb;
    --panel: #ffffff;
    --panel-soft: #eef4ff;
    --ink: #111827;
    --muted: #64748b;
    --line: #d9e2ef;
    --primary: #2563eb;
    --green: #16a34a;
    --amber: #d97706;
    --red: #dc2626;
    --radius: 8px;
    --shadow: 0 18px 54px rgba(15, 23, 42, 0.1);
}

html,
body {
    min-height: 100%;
}

body {
    min-height: 100dvh;
    background: linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
    color: var(--ink);
    font-family: Arial, Helvetica, sans-serif;
}

button,
input,
textarea {
    font: inherit;
}

button {
    cursor: pointer;
}

.app {
    width: min(760px, 100%);
    min-height: 100dvh;
    margin: 0 auto;
    padding: 24px;
}

.topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
}

.back-btn {
    width: 42px;
    height: 42px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #ffffff;
    color: var(--primary);
    font-weight: 800;
}

.title-block h1 {
    font-size: clamp(1.6rem, 4vw, 2.35rem);
    line-height: 1.1;
}

.title-block p {
    color: var(--muted);
    margin-top: 4px;
}

.edit-panel,
.missing-panel {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: rgba(255, 255, 255, 0.94);
    box-shadow: var(--shadow);
    padding: 22px;
}

.type-banner {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--panel-soft);
    padding: 12px 14px;
    font-weight: 800;
    margin-bottom: 18px;
}

.type-banner.confirmed {
    color: var(--green);
    background: rgba(22, 163, 74, 0.08);
    border-color: rgba(22, 163, 74, 0.35);
}

.type-banner.doubted {
    color: var(--amber);
    background: rgba(217, 119, 6, 0.1);
    border-color: rgba(217, 119, 6, 0.38);
}

.field {
    margin-bottom: 15px;
}

.field label {
    display: block;
    color: #334155;
    font-size: 0.84rem;
    font-weight: 700;
    margin-bottom: 7px;
}

.field input,
.field textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #ffffff;
    color: var(--ink);
    padding: 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.field textarea {
    resize: vertical;
    min-height: 96px;
}

.field input:focus,
.field textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
}

.segmented {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.type-btn {
    min-height: 44px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #ffffff;
    color: var(--muted);
    font-weight: 800;
}

.type-btn.active-confirmed {
    border-color: rgba(22, 163, 74, 0.4);
    background: rgba(22, 163, 74, 0.08);
    color: var(--green);
}

.type-btn.active-doubted {
    border-color: rgba(217, 119, 6, 0.45);
    background: rgba(217, 119, 6, 0.1);
    color: var(--amber);
}

.form-error {
    min-height: 19px;
    color: var(--red);
    font-size: 0.86rem;
}

.action-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
}

.primary-btn,
.danger-btn,
.ghost-btn {
    min-height: 46px;
    border-radius: var(--radius);
    font-weight: 800;
    border: 0;
    padding: 0 14px;
}

.primary-btn {
    flex: 1;
    background: var(--primary);
    color: #ffffff;
}

.danger-btn {
    background: rgba(220, 38, 38, 0.1);
    color: var(--red);
    border: 1px solid rgba(220, 38, 38, 0.28);
}

.ghost-btn {
    background: #e8eef7;
    color: #334155;
}

.back-btn:active,
.primary-btn:active,
.danger-btn:active,
.ghost-btn:active,
.type-btn:active {
    transform: translateY(1px);
}

.missing-panel {
    color: var(--muted);
    line-height: 1.5;
}

.missing-panel h2 {
    color: var(--ink);
    margin-bottom: 8px;
}

.confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.55);
    display: grid;
    place-items: center;
    padding: 18px;
}

.confirm-overlay[hidden] {
    display: none;
}

.confirm-box {
    width: min(360px, 100%);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #ffffff;
    box-shadow: var(--shadow);
    padding: 22px;
}

.confirm-box h2 {
    font-size: 1.1rem;
    color: var(--red);
    margin-bottom: 8px;
}

.confirm-box p {
    color: var(--muted);
    line-height: 1.45;
    margin-bottom: 16px;
}

.confirm-actions {
    display: flex;
    gap: 10px;
}

.confirm-actions button {
    flex: 1;
}

@media (max-width: 560px) {
    .app {
        padding: 14px;
    }

    .edit-panel,
    .missing-panel {
        padding: 18px;
    }

    .action-row,
    .confirm-actions {
        flex-direction: column;
    }
}
</style>
</head>
<body>
<main class="app">
    <header class="topbar">
        <button class="back-btn" type="button" id="backBtn" aria-label="Back to dashboard">&larr;</button>
        <div class="title-block">
            <h1>Edit entry</h1>
            <p>Update amount, status, notes, or remove the record.</p>
        </div>
    </header>

    <section class="missing-panel" id="missingPanel" hidden>
        <h2>Entry not found</h2>
        <p>The selected entry is missing or was already deleted.</p>
    </section>

    <section class="edit-panel" id="editPanel">
        <div class="type-banner" id="typeBanner">Confirmed entry</div>

        <form id="editForm" autocomplete="off">
            <div class="field">
                <label for="eTitle">Title</label>
                <input type="text" id="eTitle" placeholder="Title">
            </div>

            <div class="field">
                <label>Money type</label>
                <div class="segmented" role="group" aria-label="Money type">
                    <button class="type-btn" id="eBtnConfirmed" type="button" data-type="confirmed">Confirmed</button>
                    <button class="type-btn" id="eBtnDoubted" type="button" data-type="doubted">Doubted</button>
                </div>
            </div>

            <div class="field">
                <label for="eAmount">Amount (INR)</label>
                <input type="number" id="eAmount" min="0" step="0.01" inputmode="decimal">
            </div>

            <div class="field">
                <label for="eDesc">Description</label>
                <textarea id="eDesc" placeholder="Optional note"></textarea>
            </div>

            <div class="form-error" id="editError" aria-live="polite"></div>

            <div class="action-row">
                <button class="primary-btn" type="submit">Save changes</button>
                <button class="danger-btn" type="button" id="deleteBtn">Delete</button>
            </div>
        </form>
    </section>
</main>

<div class="confirm-overlay" id="confirmOverlay" hidden>
    <div class="confirm-box" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
        <h2 id="confirmTitle">Delete entry?</h2>
        <p>This will permanently remove the selected money entry.</p>
        <div class="confirm-actions">
            <button class="ghost-btn" type="button" id="cancelDeleteBtn">Cancel</button>
            <button class="danger-btn" type="button" id="confirmDeleteBtn">Delete</button>
        </div>
    </div>
</div>

<script>
(function () {
    var STORAGE_ENTRIES = "mmet_entries";
    var STORAGE_EDIT = "mmet_edit_id";

    var editId = localStorage.getItem(STORAGE_EDIT);
    var entries = readEntries();
    var entry = entries.find(function (item) {
        return item.id === editId;
    });
    var selectedType = entry ? entry.type : "confirmed";

    var editPanel = document.getElementById("editPanel");
    var missingPanel = document.getElementById("missingPanel");
    var editForm = document.getElementById("editForm");
    var titleInput = document.getElementById("eTitle");
    var amountInput = document.getElementById("eAmount");
    var descInput = document.getElementById("eDesc");
    var errorBox = document.getElementById("editError");
    var confirmOverlay = document.getElementById("confirmOverlay");
    var typeBanner = document.getElementById("typeBanner");

    function stripSuffix(title) {
        return String(title || "").trim().replace(/\s*-(c|d)$/i, "");
    }

    function normalizeEntry(item) {
        var type = item && item.type === "doubted" ? "doubted" : "confirmed";
        var amount = Number(item && item.amount);
        return {
            id: String(item && item.id ? item.id : Date.now() + Math.random()),
            title: stripSuffix(item && item.title ? item.title : "Untitled"),
            amount: Number.isFinite(amount) && amount >= 0 ? amount : 0,
            type: type,
            desc: String(item && item.desc ? item.desc : "").trim(),
            createdAt: item && item.createdAt ? item.createdAt : new Date().toISOString()
        };
    }

    function readEntries() {
        try {
            var parsed = JSON.parse(localStorage.getItem(STORAGE_ENTRIES) || "[]");
            return Array.isArray(parsed) ? parsed.map(normalizeEntry) : [];
        } catch (error) {
            return [];
        }
    }

    function saveEntries() {
        localStorage.setItem(STORAGE_ENTRIES, JSON.stringify(entries));
    }

    function goBack() {
        window.location.href = "front.html";
    }

    function setType(type) {
        selectedType = type === "doubted" ? "doubted" : "confirmed";
        document.getElementById("eBtnConfirmed").className = "type-btn" + (selectedType === "confirmed" ? " active-confirmed" : "");
        document.getElementById("eBtnDoubted").className = "type-btn" + (selectedType === "doubted" ? " active-doubted" : "");
        typeBanner.className = "type-banner " + selectedType;
        typeBanner.textContent = selectedType === "confirmed" ? "Confirmed entry" : "Doubted entry";
    }

    function showMissing() {
        editPanel.hidden = true;
        missingPanel.hidden = false;
    }

    function fillForm() {
        if (!entry) {
            showMissing();
            return;
        }

        titleInput.value = entry.title;
        amountInput.value = entry.amount;
        descInput.value = entry.desc;
        setType(entry.type);
    }

    function updateEntry(event) {
        event.preventDefault();
        if (!entry) {
            showMissing();
            return;
        }

        var title = titleInput.value.trim();
        var amount = Number(amountInput.value);
        var desc = descInput.value.trim();
        errorBox.textContent = "";

        if (!title) {
            errorBox.textContent = "Title is required.";
            titleInput.focus();
            return;
        }

        if (!Number.isFinite(amount) || amount <= 0) {
            errorBox.textContent = "Enter an amount greater than zero.";
            amountInput.focus();
            return;
        }

        var index = entries.findIndex(function (item) {
            return item.id === editId;
        });

        if (index === -1) {
            showMissing();
            return;
        }

        entries[index] = {
            id: entries[index].id,
            title: stripSuffix(title),
            amount: Math.round(amount * 100) / 100,
            type: selectedType,
            desc: desc,
            createdAt: entries[index].createdAt || new Date().toISOString()
        };

        saveEntries();
        goBack();
    }

    function deleteEntry() {
        entries = entries.filter(function (item) {
            return item.id !== editId;
        });
        saveEntries();
        localStorage.removeItem(STORAGE_EDIT);
        goBack();
    }

    document.getElementById("backBtn").addEventListener("click", goBack);
    editForm.addEventListener("submit", updateEntry);
    document.querySelectorAll("[data-type]").forEach(function (button) {
        button.addEventListener("click", function () {
            setType(button.getAttribute("data-type"));
        });
    });
    document.getElementById("deleteBtn").addEventListener("click", function () {
        confirmOverlay.hidden = false;
    });
    document.getElementById("cancelDeleteBtn").addEventListener("click", function () {
        confirmOverlay.hidden = true;
    });
    document.getElementById("confirmDeleteBtn").addEventListener("click", deleteEntry);
    confirmOverlay.addEventListener("click", function (event) {
        if (event.target === confirmOverlay) {
            confirmOverlay.hidden = true;
        }
    });

    saveEntries();
    fillForm();
})();
</script>
</body>
</html>
