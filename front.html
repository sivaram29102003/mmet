<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMET - Dashboard</title>
<meta name="theme-color" content="#2563eb">
<link rel="manifest" href="manifest.json">
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --bg: #f4f7fb;
    --panel: #ffffff;
    --panel-soft: #eef4ff;
    --ink: #111827;
    --muted: #64748b;
    --line: #d9e2ef;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --green: #16a34a;
    --amber: #d97706;
    --red: #dc2626;
    --teal: #0f766e;
    --radius: 8px;
    --shadow: 0 18px 54px rgba(15, 23, 42, 0.1);
}

html,
body {
    min-height: 100%;
}

body {
    min-height: 100dvh;
    background:
        radial-gradient(circle at top right, rgba(20, 184, 166, 0.13), transparent 28rem),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
    color: var(--ink);
    font-family: Arial, Helvetica, sans-serif;
}

button,
input,
textarea {
    font: inherit;
}

button {
    cursor: pointer;
}

.app {
    width: min(1180px, 100%);
    min-height: 100dvh;
    margin: 0 auto;
    padding: 24px;
}

.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    margin-bottom: 20px;
}

.brand h1 {
    font-size: clamp(1.9rem, 4vw, 3rem);
    line-height: 1;
    margin-bottom: 7px;
}

.brand p {
    color: var(--muted);
    line-height: 1.45;
}

.profile-panel {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: rgba(255, 255, 255, 0.88);
    padding: 10px;
    box-shadow: 0 10px 28px rgba(15, 23, 42, 0.07);
}

.avatar-button {
    width: 62px;
    height: 62px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--panel-soft);
    color: var(--primary);
    display: grid;
    place-items: center;
    overflow: hidden;
}

.avatar-button img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.avatar-initials {
    font-weight: 800;
    font-size: 1.1rem;
}

.profile-copy strong {
    display: block;
    font-size: 0.95rem;
    margin-bottom: 6px;
}

.photo-actions {
    display: flex;
    gap: 8px;
}

.small-btn {
    min-height: 34px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #ffffff;
    color: var(--ink);
    padding: 0 10px;
    font-size: 0.84rem;
    font-weight: 700;
}

.small-btn.danger {
    color: var(--red);
    border-color: rgba(220, 38, 38, 0.28);
}

.small-btn[hidden] {
    display: none;
}

#profileInput {
    display: none;
}

.layout {
    display: grid;
    grid-template-columns: minmax(0, 390px) minmax(0, 1fr);
    gap: 20px;
    align-items: start;
}

.tool-panel,
.list-panel {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: rgba(255, 255, 255, 0.94);
    box-shadow: var(--shadow);
}

.tool-panel {
    padding: 20px;
}

.panel-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
}

.panel-title h2 {
    font-size: 1.1rem;
}

.panel-title span {
    color: var(--muted);
    font-size: 0.86rem;
}

.field {
    margin-bottom: 15px;
}

.field label {
    display: block;
    color: #334155;
    font-size: 0.84rem;
    font-weight: 700;
    margin-bottom: 7px;
}

.field input,
.field textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #ffffff;
    color: var(--ink);
    padding: 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}

.field textarea {
    resize: vertical;
    min-height: 88px;
}

.field input:focus,
.field textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
}

.segmented {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.type-btn {
    min-height: 44px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #ffffff;
    color: var(--muted);
    font-weight: 800;
}

.type-btn.active-confirmed {
    border-color: rgba(22, 163, 74, 0.4);
    background: rgba(22, 163, 74, 0.08);
    color: var(--green);
}

.type-btn.active-doubted {
    border-color: rgba(217, 119, 6, 0.45);
    background: rgba(217, 119, 6, 0.1);
    color: var(--amber);
}

.form-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
}

.primary-btn,
.ghost-btn {
    min-height: 46px;
    border-radius: var(--radius);
    font-weight: 800;
    border: 0;
    padding: 0 14px;
}

.primary-btn {
    flex: 1;
    background: var(--primary);
    color: #ffffff;
}

.primary-btn:active,
.ghost-btn:active,
.small-btn:active,
.type-btn:active,
.entry-card:active {
    transform: translateY(1px);
}

.ghost-btn {
    background: #e8eef7;
    color: #334155;
}

.form-error,
.profile-status {
    min-height: 19px;
    color: var(--red);
    font-size: 0.86rem;
}

.profile-status {
    color: var(--muted);
    margin-top: 6px;
}

.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 14px;
}

.metric-card {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: #ffffff;
    padding: 16px;
}

.metric-card span {
    display: block;
    color: var(--muted);
    font-size: 0.82rem;
    margin-bottom: 8px;
}

.metric-card strong {
    display: block;
    font-size: clamp(1.15rem, 2.2vw, 1.8rem);
    line-height: 1.05;
}

.metric-card.confirmed strong {
    color: var(--green);
}

.metric-card.doubted strong {
    color: var(--amber);
}

.list-panel {
    padding: 18px;
}

.list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
}

.list-header h2 {
    font-size: 1.1rem;
}

.list-header span {
    color: var(--muted);
    font-size: 0.86rem;
}

.entry-list {
    display: grid;
    gap: 10px;
}

.entry-card {
    width: 100%;
    border: 1px solid var(--line);
    border-left-width: 5px;
    border-radius: var(--radius);
    background: #ffffff;
    padding: 14px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 14px;
    text-align: left;
}

.entry-card.confirmed {
    border-left-color: var(--green);
}

.entry-card.doubted {
    border-left-color: var(--amber);
}

.entry-title {
    font-weight: 800;
    color: var(--ink);
    margin-bottom: 5px;
    overflow-wrap: anywhere;
}

.entry-desc {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.45;
    overflow-wrap: anywhere;
}

.entry-side {
    display: grid;
    justify-items: end;
    gap: 7px;
    align-content: start;
}

.entry-amount {
    font-weight: 800;
    color: var(--ink);
    white-space: nowrap;
}

.badge {
    border-radius: 999px;
    padding: 4px 9px;
    font-size: 0.72rem;
    font-weight: 800;
}

.badge.confirmed {
    color: var(--green);
    background: rgba(22, 163, 74, 0.09);
}

.badge.doubted {
    color: var(--amber);
    background: rgba(217, 119, 6, 0.11);
}

.empty-state {
    border: 1px dashed #cbd5e1;
    border-radius: var(--radius);
    background: #f8fafc;
    color: var(--muted);
    padding: 34px 18px;
    text-align: center;
    line-height: 1.5;
}

@media (max-width: 880px) {
    .app {
        padding: 18px;
    }

    .topbar,
    .layout {
        grid-template-columns: 1fr;
    }

    .topbar {
        display: grid;
    }
}

@media (max-width: 560px) {
    .app {
        padding: 14px;
    }

    .profile-panel {
        align-items: flex-start;
    }

    .photo-actions,
    .form-actions {
        flex-wrap: wrap;
    }

    .stats-grid {
        grid-template-columns: 1fr;
    }

    .entry-card {
        grid-template-columns: 1fr;
    }

    .entry-side {
        justify-items: start;
    }
}
</style>
</head>
<body>
<main class="app">
    <header class="topbar">
        <div class="brand">
            <h1>MMET</h1>
            <p>My Money Expense Tracker</p>
        </div>

        <div class="profile-panel">
            <button class="avatar-button" id="profilePickBtn" type="button" aria-label="Change profile photo">
                <img id="profileImg" src="" alt="Profile photo" hidden>
                <span class="avatar-initials" id="profileInitials">SM</span>
            </button>
            <div class="profile-copy">
                <strong>Siva</strong>
                <div class="photo-actions">
                    <button class="small-btn" id="profileUploadBtn" type="button">Change photo</button>
                    <button class="small-btn danger" id="profileRemoveBtn" type="button" hidden>Remove photo</button>
                </div>
                <div class="profile-status" id="profileStatus" aria-live="polite"></div>
            </div>
            <input type="file" id="profileInput" accept="image/*">
        </div>
    </header>

    <section class="stats-grid" aria-label="Money totals">
        <div class="metric-card">
            <span>Total money</span>
            <strong id="ftTotal">&#8377;0</strong>
        </div>
        <div class="metric-card confirmed">
            <span>Confirmed</span>
            <strong id="ftConfirmed">&#8377;0</strong>
        </div>
        <div class="metric-card doubted">
            <span>Doubted</span>
            <strong id="ftDoubted">&#8377;0</strong>
        </div>
    </section>

    <div class="layout">
        <section class="tool-panel" aria-label="Add entry">
            <div class="panel-title">
                <h2>Add entry</h2>
                <span id="entryCount">0 saved</span>
            </div>

            <form id="entryForm" autocomplete="off">
                <div class="field">
                    <label for="mTitle">Title</label>
                    <input type="text" id="mTitle" placeholder="Example: Rent, fuel, shopping">
                </div>

                <div class="field">
                    <label>Money type</label>
                    <div class="segmented" role="group" aria-label="Money type">
                        <button class="type-btn active-confirmed" id="btnConfirmed" type="button" data-type="confirmed">Confirmed</button>
                        <button class="type-btn" id="btnDoubted" type="button" data-type="doubted">Doubted</button>
                    </div>
                </div>

                <div class="field">
                    <label for="mAmount">Amount (INR)</label>
                    <input type="number" id="mAmount" placeholder="0" min="0" step="0.01" inputmode="decimal">
                </div>

                <div class="field">
                    <label for="mDesc">Description</label>
                    <textarea id="mDesc" placeholder="Optional note"></textarea>
                </div>

                <div class="form-error" id="modalError" aria-live="polite"></div>

                <div class="form-actions">
                    <button class="primary-btn" type="submit">Save entry</button>
                    <button class="ghost-btn" type="reset">Clear</button>
                </div>
            </form>
        </section>

        <section class="list-panel" aria-label="Entries">
            <div class="list-header">
                <h2>Entries</h2>
                <span>Tap an entry to edit</span>
            </div>
            <div class="entry-list" id="cardsArea">
                <div class="empty-state" id="emptyState">
                    No entries yet. Add your first money record to begin.
                </div>
            </div>
        </section>
    </div>
</main>

<script>
(function () {
    var STORAGE_ENTRIES = "mmet_entries";
    var STORAGE_EDIT = "mmet_edit_id";
    var STORAGE_PHOTO = "mmet_profile_photo";

    var entries = readEntries();
    var selectedType = "confirmed";

    var form = document.getElementById("entryForm");
    var titleInput = document.getElementById("mTitle");
    var amountInput = document.getElementById("mAmount");
    var descInput = document.getElementById("mDesc");
    var errorBox = document.getElementById("modalError");
    var cardsArea = document.getElementById("cardsArea");
    var emptyState = document.getElementById("emptyState");
    var profileInput = document.getElementById("profileInput");
    var profileImg = document.getElementById("profileImg");
    var profileInitials = document.getElementById("profileInitials");
    var profileUploadBtn = document.getElementById("profileUploadBtn");
    var profilePickBtn = document.getElementById("profilePickBtn");
    var profileRemoveBtn = document.getElementById("profileRemoveBtn");
    var profileStatus = document.getElementById("profileStatus");

    function stripSuffix(title) {
        return String(title || "").trim().replace(/\s*-(c|d)$/i, "");
    }

    function normalizeEntry(entry) {
        var type = entry && entry.type === "doubted" ? "doubted" : "confirmed";
        var amount = Number(entry && entry.amount);
        return {
            id: String(entry && entry.id ? entry.id : Date.now() + Math.random()),
            title: stripSuffix(entry && entry.title ? entry.title : "Untitled"),
            amount: Number.isFinite(amount) && amount >= 0 ? amount : 0,
            type: type,
            desc: String(entry && entry.desc ? entry.desc : "").trim(),
            createdAt: entry && entry.createdAt ? entry.createdAt : new Date().toISOString()
        };
    }

    function readEntries() {
        try {
            var parsed = JSON.parse(localStorage.getItem(STORAGE_ENTRIES) || "[]");
            return Array.isArray(parsed) ? parsed.map(normalizeEntry) : [];
        } catch (error) {
            return [];
        }
    }

    function saveEntries() {
        localStorage.setItem(STORAGE_ENTRIES, JSON.stringify(entries));
    }

    function formatMoney(value) {
        return "\u20b9" + Number(value || 0).toLocaleString("en-IN", {
            maximumFractionDigits: 2
        });
    }

    function setType(type) {
        selectedType = type === "doubted" ? "doubted" : "confirmed";
        document.getElementById("btnConfirmed").className = "type-btn" + (selectedType === "confirmed" ? " active-confirmed" : "");
        document.getElementById("btnDoubted").className = "type-btn" + (selectedType === "doubted" ? " active-doubted" : "");
    }

    function renderTotals() {
        var confirmed = 0;
        var doubted = 0;

        entries.forEach(function (entry) {
            if (entry.type === "doubted") {
                doubted += Number(entry.amount);
            } else {
                confirmed += Number(entry.amount);
            }
        });

        document.getElementById("ftTotal").textContent = formatMoney(confirmed + doubted);
        document.getElementById("ftConfirmed").textContent = formatMoney(confirmed);
        document.getElementById("ftDoubted").textContent = formatMoney(doubted);
        document.getElementById("entryCount").textContent = entries.length + (entries.length === 1 ? " saved" : " saved");
    }

    function renderEntries() {
        cardsArea.querySelectorAll(".entry-card").forEach(function (card) {
            card.remove();
        });

        if (!entries.length) {
            emptyState.hidden = false;
            renderTotals();
            return;
        }

        emptyState.hidden = true;

        entries.slice().sort(function (a, b) {
            return new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime();
        }).forEach(function (entry) {
            var card = document.createElement("button");
            card.type = "button";
            card.className = "entry-card " + entry.type;
            card.addEventListener("click", function () {
                localStorage.setItem(STORAGE_EDIT, entry.id);
                window.location.href = "edit.html";
            });

            var main = document.createElement("div");
            var title = document.createElement("div");
            title.className = "entry-title";
            title.textContent = entry.title;
            main.appendChild(title);

            if (entry.desc) {
                var desc = document.createElement("div");
                desc.className = "entry-desc";
                desc.textContent = entry.desc;
                main.appendChild(desc);
            }

            var side = document.createElement("div");
            side.className = "entry-side";
            var amount = document.createElement("div");
            amount.className = "entry-amount";
            amount.textContent = formatMoney(entry.amount);
            var badge = document.createElement("div");
            badge.className = "badge " + entry.type;
            badge.textContent = entry.type === "confirmed" ? "Confirmed" : "Doubted";
            side.appendChild(amount);
            side.appendChild(badge);

            card.appendChild(main);
            card.appendChild(side);
            cardsArea.appendChild(card);
        });

        renderTotals();
    }

    function saveNewEntry(event) {
        event.preventDefault();
        var title = titleInput.value.trim();
        var amount = Number(amountInput.value);
        var desc = descInput.value.trim();

        errorBox.textContent = "";

        if (!title) {
            errorBox.textContent = "Title is required.";
            titleInput.focus();
            return;
        }

        if (!Number.isFinite(amount) || amount <= 0) {
            errorBox.textContent = "Enter an amount greater than zero.";
            amountInput.focus();
            return;
        }

        entries.push({
            id: Date.now().toString(),
            title: stripSuffix(title),
            amount: Math.round(amount * 100) / 100,
            type: selectedType,
            desc: desc,
            createdAt: new Date().toISOString()
        });

        saveEntries();
        form.reset();
        setType("confirmed");
        renderEntries();
        titleInput.focus();
    }

    function setProfilePhoto(dataUrl) {
        if (dataUrl) {
            profileImg.src = dataUrl;
            profileImg.hidden = false;
            profileInitials.hidden = true;
            profileRemoveBtn.hidden = false;
        } else {
            profileImg.removeAttribute("src");
            profileImg.hidden = true;
            profileInitials.hidden = false;
            profileRemoveBtn.hidden = true;
        }
    }

    function storeResizedPhoto(file) {
        profileStatus.textContent = "";

        if (!file || !file.type || file.type.indexOf("image/") !== 0) {
            profileStatus.textContent = "Choose an image file.";
            return;
        }

        var reader = new FileReader();
        reader.onload = function (event) {
            var image = new Image();
            image.onload = function () {
                var maxSize = 720;
                var scale = Math.min(1, maxSize / Math.max(image.width, image.height));
                var width = Math.max(1, Math.round(image.width * scale));
                var height = Math.max(1, Math.round(image.height * scale));
                var canvas = document.createElement("canvas");
                canvas.width = width;
                canvas.height = height;
                var context = canvas.getContext("2d");
                context.drawImage(image, 0, 0, width, height);
                var dataUrl = canvas.toDataURL("image/jpeg", 0.84);

                try {
                    localStorage.setItem(STORAGE_PHOTO, dataUrl);
                    setProfilePhoto(dataUrl);
                    profileStatus.textContent = "Photo updated.";
                } catch (error) {
                    profileStatus.textContent = "Photo is too large to save.";
                }
            };
            image.onerror = function () {
                profileStatus.textContent = "Could not read that image.";
            };
            image.src = event.target.result;
        };
        reader.readAsDataURL(file);
    }

    document.querySelectorAll("[data-type]").forEach(function (button) {
        button.addEventListener("click", function () {
            setType(button.getAttribute("data-type"));
        });
    });

    form.addEventListener("submit", saveNewEntry);
    form.addEventListener("reset", function () {
        window.setTimeout(function () {
            errorBox.textContent = "";
            setType("confirmed");
        }, 0);
    });

    profileUploadBtn.addEventListener("click", function () {
        profileInput.click();
    });
    profilePickBtn.addEventListener("click", function () {
        profileInput.click();
    });
    profileInput.addEventListener("change", function () {
        storeResizedPhoto(profileInput.files[0]);
        profileInput.value = "";
    });
    profileRemoveBtn.addEventListener("click", function () {
        localStorage.removeItem(STORAGE_PHOTO);
        setProfilePhoto("");
        profileStatus.textContent = "Photo removed.";
    });

    setProfilePhoto(localStorage.getItem(STORAGE_PHOTO));
    saveEntries();
    renderEntries();
})();
</script>
</body>
</html>
