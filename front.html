<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MMET — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg:        #48426d;
    --bg-dark:   #342e55;
    --bg-deeper: #28234a;
    --accent:    #c9b8ff;
    --accent2:   #8b7fd4;
    --confirmed: #4caf8a;
    --doubted:   #e07b5a;
    --surface:   rgba(255,255,255,0.06);
    --surface2:  rgba(255,255,255,0.11);
    --border:    rgba(255,255,255,0.12);
    --text:      #f0ecff;
    --text-dim:  #a099c8;
    --font-head: 'Orbitron', monospace;
    --font-body: 'Rajdhani', sans-serif;
    --radius:    6px;
}

html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg-deeper);
    font-family: var(--font-body);
    color: var(--text);
}

/* ── APP SHELL ── */
.app {
    width: 100%; max-width: 430px;
    height: 100dvh;
    margin: 0 auto;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
}

/* ── HEADER ── */
.header {
    padding: 15px 15px 12px;
    background: var(--bg-dark);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}

.header-brand {
    display: flex;
    flex-direction: column;
}

.header-brand .brand-name {
    font-family: var(--font-head);
    font-size: 1.05rem;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
}

.header-brand .brand-sub {
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    margin-top: 3px;
    font-weight: 500;
}

/* Profile image square */
.profile-box {
    width: 48px;
    height: 48px;
    border: 2px solid var(--accent2);
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: var(--bg-deeper);
    flex-shrink: 0;
}

.profile-box img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
}

.profile-upload-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 2px;
    background: var(--bg-deeper);
}

.profile-upload-hint span {
    font-size: 18px;
    line-height: 1;
}

.profile-upload-hint small {
    font-size: 0.5rem;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-align: center;
}

#profileInput { display: none; }

/* ── ADD MH BUTTON ── */
.add-btn-wrap {
    padding: 12px 15px;
    flex-shrink: 0;
}

.add-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent2) 0%, #6b5fc2 100%);
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-head);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 3px;
    color: #fff;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.2s, transform 0.1s;
    box-shadow: 0 4px 18px rgba(139,127,212,0.35);
}

.add-btn:active { opacity: 0.85; transform: scale(0.98); }

/* ── CARDS AREA ── */
.cards-area {
    flex: 1;
    overflow-y: auto;
    padding: 10px 15px 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
}

.cards-area::-webkit-scrollbar { width: 3px; }
.cards-area::-webkit-scrollbar-track { background: transparent; }
.cards-area::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 2px; }

/* empty state */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: var(--text-dim);
    text-align: center;
}

.empty-state .empty-icon { font-size: 2.5rem; opacity: 0.4; }
.empty-state p { font-size: 0.9rem; letter-spacing: 0.5px; }

/* card */
.entry-card {
    border-radius: var(--radius);
    padding: 13px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
}

.entry-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: var(--radius) 0 0 var(--radius);
}

.entry-card.confirmed {
    background: rgba(76,175,138,0.12);
    border-color: rgba(76,175,138,0.28);
}
.entry-card.confirmed::before { background: var(--confirmed); }

.entry-card.doubted {
    background: rgba(224,123,90,0.12);
    border-color: rgba(224,123,90,0.28);
}
.entry-card.doubted::before { background: var(--doubted); }

.entry-card:active { transform: scale(0.985); opacity: 0.85; }

.card-left { display: flex; flex-direction: column; gap: 3px; }

.card-title {
    font-family: var(--font-head);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--text);
}

.card-desc {
    font-size: 0.8rem;
    color: var(--text-dim);
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

.card-amount {
    font-family: var(--font-head);
    font-size: 0.88rem;
    font-weight: 700;
}

.entry-card.confirmed .card-amount { color: var(--confirmed); }
.entry-card.doubted .card-amount { color: var(--doubted); }

.card-badge {
    font-size: 0.6rem;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 600;
}

.entry-card.confirmed .card-badge {
    background: rgba(76,175,138,0.2);
    color: var(--confirmed);
}
.entry-card.doubted .card-badge {
    background: rgba(224,123,90,0.2);
    color: var(--doubted);
}

/* ── FOOTER ── */
.footer {
    flex-shrink: 0;
    height: 72px;
    background: var(--bg-dark);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    padding: 0;
}

.footer-cell {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    border-right: 1px solid var(--border);
    padding: 8px 4px;
}

.footer-cell:last-child { border-right: none; }

.footer-label {
    font-size: 0.58rem;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    font-weight: 600;
}

.footer-amount {
    font-family: var(--font-head);
    font-size: 0.82rem;
    font-weight: 700;
}

.footer-cell:nth-child(1) .footer-amount { color: var(--accent); }
.footer-cell:nth-child(2) .footer-amount { color: var(--confirmed); }
.footer-cell:nth-child(3) .footer-amount { color: var(--doubted); }

/* ── MODAL OVERLAY ── */
.modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(20,16,40,0.78);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: flex-end;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
}

.modal-overlay.open {
    opacity: 1;
    pointer-events: all;
}

.modal-sheet {
    width: 100%;
    background: var(--bg-dark);
    border-radius: 16px 16px 0 0;
    padding: 20px 18px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transform: translateY(40px);
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
}

.modal-overlay.open .modal-sheet { transform: translateY(0); }

.modal-title {
    font-family: var(--font-head);
    font-size: 0.78rem;
    letter-spacing: 2px;
    color: var(--accent);
    text-align: center;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
}

/* inputs */
.field-label {
    font-size: 0.72rem;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 5px;
    font-weight: 600;
    text-transform: uppercase;
}

.m-input {
    width: 100%;
    padding: 11px 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
}

.m-input:focus { border-color: var(--accent2); }
.m-input::placeholder { color: var(--text-dim); opacity: 0.6; }

/* type toggle */
.type-toggle {
    display: flex;
    gap: 8px;
}

.type-btn {
    flex: 1;
    padding: 10px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.18s;
}

.type-btn.active-confirmed {
    background: rgba(76,175,138,0.18);
    border-color: var(--confirmed);
    color: var(--confirmed);
}

.type-btn.active-doubted {
    background: rgba(224,123,90,0.18);
    border-color: var(--doubted);
    color: var(--doubted);
}

.modal-error {
    font-size: 0.78rem;
    color: var(--doubted);
    text-align: center;
    min-height: 16px;
    letter-spacing: 0.5px;
}

/* save button */
.save-btn {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--accent2) 0%, #5a4fb5 100%);
    border: none;
    border-radius: var(--radius);
    font-family: var(--font-head);
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: #fff;
    cursor: pointer;
    transition: opacity 0.2s;
}

.save-btn:active { opacity: 0.8; }

.cancel-link {
    text-align: center;
    font-size: 0.8rem;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.5px;
}

.cancel-link:active { opacity: 0.6; }
</style>
</head>
<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <div class="header-brand">
            <span class="brand-name">Siva MMET</span>
            <span class="brand-sub">My Money Expense Tracker</span>
        </div>

        <div class="profile-box" onclick="document.getElementById('profileInput').click()">
            <div class="profile-upload-hint" id="profileHint">
                <span>📷</span>
                <small>UPLOAD</small>
            </div>
            <img id="profileImg" src="https://placehold.co/48x48/342e55/c9b8ff?text=S" alt="Profile" style="display:none">
        </div>
        <input type="file" id="profileInput" accept="image/*">
    </div>

    <!-- ADD MH BUTTON -->
    <div class="add-btn-wrap">
        <button class="add-btn" onclick="openModal()">＋ &nbsp; ADD MH</button>
    </div>

    <!-- CARDS -->
    <div class="cards-area" id="cardsArea">
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">💰</div>
            <p>No entries yet.<br>Tap ADD MH to begin.</p>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        <div class="footer-cell">
            <span class="footer-label">Tot Money</span>
            <span class="footer-amount" id="ftTotal">₹0</span>
        </div>
        <div class="footer-cell">
            <span class="footer-label">Confirmed</span>
            <span class="footer-amount" id="ftConfirmed">₹0</span>
        </div>
        <div class="footer-cell">
            <span class="footer-label">Doubted</span>
            <span class="footer-amount" id="ftDoubted">₹0</span>
        </div>
    </div>

    <!-- ADD MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
        <div class="modal-sheet">
            <div class="modal-title">NEW ENTRY</div>

            <div>
                <div class="field-label">Title</div>
                <input type="text" class="m-input" id="mTitle" placeholder="Enter title">
            </div>

            <div>
                <div class="field-label">Money Type</div>
                <div class="type-toggle">
                    <button class="type-btn" id="btnConfirmed" onclick="selectType('confirmed')">✔ Confirmed</button>
                    <button class="type-btn" id="btnDoubted"  onclick="selectType('doubted')">? Doubted</button>
                </div>
            </div>

            <div>
                <div class="field-label">Amount (₹)</div>
                <input type="number" class="m-input" id="mAmount" placeholder="0" min="0">
            </div>

            <div>
                <div class="field-label">Description <span style="color:var(--text-dim);font-size:0.65rem">(optional)</span></div>
                <input type="text" class="m-input" id="mDesc" placeholder="Add a note…">
            </div>

            <div class="modal-error" id="modalError"></div>

            <button class="save-btn" onclick="saveEntry()">SAVE ENTRY</button>
            <div class="cancel-link" onclick="closeModal()">Cancel</div>
        </div>
    </div>

</div>

<script>
// ── DATA ──────────────────────────────────────────────
let entries = JSON.parse(localStorage.getItem('mmet_entries') || '[]');
let selectedType = '';

function save() {
    localStorage.setItem('mmet_entries', JSON.stringify(entries));
}

// ── RENDER ────────────────────────────────────────────
function render() {
    const area = document.getElementById('cardsArea');
    const empty = document.getElementById('emptyState');

    // Sort: confirmed first, doubted second
    const sorted = [...entries].sort((a, b) => {
        const order = { confirmed: 0, doubted: 1 };
        return order[a.type] - order[b.type];
    });

    // Remove existing cards (keep emptyState)
    area.querySelectorAll('.entry-card').forEach(el => el.remove());

    if (sorted.length === 0) {
        empty.style.display = 'flex';
    } else {
        empty.style.display = 'none';
        sorted.forEach(entry => {
            const card = document.createElement('div');
            card.className = `entry-card ${entry.type}`;
            card.dataset.id = entry.id;
            card.innerHTML = `
                <div class="card-left">
                    <div class="card-title">${entry.title}</div>
                    ${entry.desc ? `<div class="card-desc">${entry.desc}</div>` : ''}
                </div>
                <div class="card-right">
                    <div class="card-amount">₹${Number(entry.amount).toLocaleString('en-IN')}</div>
                    <div class="card-badge">${entry.type === 'confirmed' ? 'CONFIRMED' : 'DOUBTED'}</div>
                </div>
            `;
            card.addEventListener('click', () => openEdit(entry.id));
            area.appendChild(card);
        });
    }

    updateFooter();
}

function updateFooter() {
    let confirmed = 0, doubted = 0;
    entries.forEach(e => {
        if (e.type === 'confirmed') confirmed += Number(e.amount);
        else doubted += Number(e.amount);
    });
    const fmt = n => '₹' + n.toLocaleString('en-IN');
    document.getElementById('ftTotal').textContent     = fmt(confirmed + doubted);
    document.getElementById('ftConfirmed').textContent = fmt(confirmed);
    document.getElementById('ftDoubted').textContent   = fmt(doubted);
}

// ── MODAL ─────────────────────────────────────────────
function openModal() {
    selectedType = '';
    document.getElementById('mTitle').value = '';
    document.getElementById('mAmount').value = '';
    document.getElementById('mDesc').value = '';
    document.getElementById('modalError').textContent = '';
    document.getElementById('btnConfirmed').className = 'type-btn';
    document.getElementById('btnDoubted').className   = 'type-btn';
    document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
}

function overlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function selectType(type) {
    selectedType = type;
    document.getElementById('btnConfirmed').className = 'type-btn' + (type === 'confirmed' ? ' active-confirmed' : '');
    document.getElementById('btnDoubted').className   = 'type-btn' + (type === 'doubted'   ? ' active-doubted'   : '');
}

function saveEntry() {
    const title  = document.getElementById('mTitle').value.trim();
    const amount = document.getElementById('mAmount').value.trim();
    const desc   = document.getElementById('mDesc').value.trim();
    const err    = document.getElementById('modalError');

    if (!title) { err.textContent = 'Title is required.'; return; }
    if (!selectedType) { err.textContent = 'Select Confirmed or Doubted.'; return; }
    if (!amount || isNaN(amount) || Number(amount) < 0) { err.textContent = 'Enter a valid amount.'; return; }

    const suffix = selectedType === 'confirmed' ? '-c' : '-d';
    const entry = {
        id:     Date.now().toString(),
        title:  title + suffix,
        amount: Number(amount),
        type:   selectedType,
        desc:   desc,
        createdAt: new Date().toISOString()
    };

    entries.push(entry);
    save();
    render();
    closeModal();
}

// ── EDIT NAV ──────────────────────────────────────────
function openEdit(id) {
    localStorage.setItem('mmet_edit_id', id);
    window.location.href = 'edit.html';
}

// ── PROFILE UPLOAD ────────────────────────────────────
document.getElementById('profileInput').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const img = document.getElementById('profileImg');
        img.src = e.target.result;
        img.style.display = 'block';
        document.getElementById('profileHint').style.display = 'none';
    };
    reader.readAsDataURL(file);
});

// ── INIT ─────────────────────────────────────────────
render();
</script>
</body>
</html>
