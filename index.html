<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MMET - Login</title>

    <meta name="theme-color" content="#48426d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #48426d;
            --bg-dark: #342e55;
            --bg-deeper: #28234a;
            --accent: #c9b8ff;
            --accent2: #8b7fd4;
            --surface: rgba(255,255,255,0.06);
            --surface2: rgba(255,255,255,0.11);
            --border: rgba(255,255,255,0.12);
            --text: #f0ecff;
            --text-dim: #a099c8;
            --success: #4caf8a;
            --danger: #e07b5a;
            --font-head: 'Orbitron', monospace;
            --font-body: 'Rajdhani', sans-serif;
            --radius: 6px;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-deeper);
            color: var(--text);
            font-family: var(--font-body);
        }

        .phone-container {
            width: 100%;
            height: 100dvh;
            height: calc(var(--app-height, 100dvh));
            max-width: 430px;
            margin: 0 auto;
            position: relative;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .top-band {
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            padding: 28px 20px 24px;
        }

        .tracker-header {
            text-align: left;
            text-transform: uppercase;
        }

        .welcome-text {
            display: block;
            color: var(--text-dim);
            font-family: var(--font-body);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .mmet-text {
            display: block;
            color: var(--accent);
            font-family: var(--font-head);
            font-size: clamp(1.15rem, 6vw, 1.65rem);
            font-weight: 900;
            letter-spacing: 3px;
            line-height: 1.25;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 18px;
            min-height: 0;
            padding: 20px 18px 18px;
        }

        .credential-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .credential-title {
            color: var(--accent);
            font-family: var(--font-head);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-align: center;
            text-transform: uppercase;
        }

        .input-container {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .rect-input {
            width: 100%;
            min-width: 0;
            padding: 12px 13px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            caret-color: var(--accent);
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        .rect-input::placeholder {
            color: var(--text-dim);
            opacity: 0.75;
        }

        .rect-input:focus {
            background: rgba(255,255,255,0.14);
            border-color: var(--accent2);
        }

        .swipe-container {
            width: 100%;
            height: 54px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--bg-deeper);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .swipe-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(139,127,212,0.28), transparent 68%);
            pointer-events: none;
        }

        .swipe-text {
            position: absolute;
            z-index: 1;
            color: var(--text-dim);
            font-family: var(--font-head);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 2px;
            pointer-events: none;
            text-transform: uppercase;
        }

        .swipe-slider {
            width: 100%;
            height: 100%;
            margin: 0;
            background: transparent;
            border: 0;
            outline: none;
            position: relative;
            z-index: 2;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }

        .swipe-slider::-webkit-slider-thumb {
            width: 72px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent2) 0%, #6b5fc2 100%);
            border: 0;
            border-radius: var(--radius);
            box-shadow: 0 4px 18px rgba(139,127,212,0.35);
            cursor: grab;
            -webkit-appearance: none;
            appearance: none;
        }

        .swipe-slider::-webkit-slider-thumb:active {
            cursor: grabbing;
        }

        .swipe-slider::-moz-range-thumb {
            width: 72px;
            height: 52px;
            background: linear-gradient(135deg, var(--accent2) 0%, #6b5fc2 100%);
            border: 0;
            border-radius: var(--radius);
            box-shadow: 0 4px 18px rgba(139,127,212,0.35);
            cursor: grab;
        }

        .swipe-slider::-moz-range-track {
            background: transparent;
            border: 0;
        }

        .status-message {
            min-height: 18px;
            color: var(--text-dim);
            font-size: 0.86rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            line-height: 1.25;
            text-align: center;
        }

        .error-state {
            color: var(--danger);
        }

        .success-state {
            color: var(--success);
        }

        .bottom-image-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            min-height: 150px;
            overflow: hidden;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .bottom-image-container img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .rotate-overlay {
            display: none;
        }

        @media (max-width: 360px) {
            .top-band {
                padding: 24px 16px 20px;
            }

            .content {
                padding: 16px 14px 14px;
            }

            .credential-wrapper {
                padding: 16px 14px;
            }

            .input-container {
                flex-direction: column;
            }
        }

        @media (orientation: landscape) {
            .phone-container {
                display: none !important;
            }

            .rotate-overlay {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex !important;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 16px;
                padding: 24px;
                background: var(--bg-deeper);
                color: var(--text);
                text-align: center;
            }

            .rotate-overlay svg {
                width: 64px;
                height: 64px;
                animation: rotateHint 1.6s ease-in-out infinite;
            }

            .rotate-overlay p {
                max-width: 260px;
                color: var(--text-dim);
                font-size: 1rem;
                font-weight: 600;
                line-height: 1.4;
            }

            @keyframes rotateHint {
                0%, 100% {
                    transform: rotate(0deg);
                }

                50% {
                    transform: rotate(-90deg);
                }
            }
        }
    </style>
</head>
<body>
    <div class="rotate-overlay">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="5" y="2" width="14" height="20" rx="2"></rect>
            <line x1="12" y1="18" x2="12" y2="18"></line>
        </svg>
        <p>Please rotate your device back to portrait mode to use this app.</p>
    </div>

    <div class="phone-container">
        <main class="phone-screen">
            <header class="top-band">
                <div class="tracker-header">
                    <span class="welcome-text">Welcome To</span>
                    <span class="mmet-text">My Money Expense Tracker</span>
                </div>
            </header>

            <section class="content">
                <div class="credential-wrapper">
                    <div class="credential-title">Siva's Credentials</div>

                    <div class="input-container">
                        <input type="text" id="box1" class="rect-input" placeholder="Name" autocomplete="username">
                        <input type="password" id="box2" class="rect-input" placeholder="Password" autocomplete="current-password">
                    </div>

                    <div class="swipe-container">
                        <span class="swipe-text" id="swipeText">Swipe to Enter</span>
                        <input type="range" min="0" max="100" value="0" class="swipe-slider" id="swipeGate" tabindex="-1" aria-label="Swipe to enter">
                    </div>

                    <div class="status-message" id="statusMsg" aria-live="polite"></div>
                </div>

                <div class="bottom-image-container">
                    <img src="Copilot_20260623_213923.png" alt="Tracker Graphic">
                </div>
            </section>
        </main>
    </div>

    <script>
        function setAppHeight() {
            document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
        }

        function lockPortrait() {
            try {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('portrait').catch(() => {});
                }
            } catch (error) {}
        }

        setAppHeight();
        lockPortrait();
        window.addEventListener('resize', setAppHeight);
        window.addEventListener('orientationchange', setAppHeight);
        window.addEventListener('load', lockPortrait);
        document.addEventListener('fullscreenchange', lockPortrait);

        if ('serviceWorker' in navigator && location.protocol !== 'file:') {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
    <script src="credential.js"></script>
</body>
</html>
